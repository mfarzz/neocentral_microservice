version: '3.8'

services:
  # ── Database (MySQL) ──────────────────────────
  mysql:
    image: mysql:8.0
    container_name: neocentral-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: neocentral_auth
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # ── Cache (Redis) ─────────────────────────────
  redis:
    image: redis:7.0-alpine
    container_name: neocentral-redis2
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

  # ── Message Broker (NATS) ─────────────────────
  nats:
    image: nats:2.9-alpine
    container_name: neocentral-nats
    restart: always
    ports:
      - "4222:4222" # Client port
      - "8222:8222" # HTTP management port
    command: ["-js"] # Enable JetStream

volumes:
  mysql_data:
  redis_data:
