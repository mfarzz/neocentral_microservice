version: '3.8'

services:
  # ── Database (MySQL) ──────────────────────────
  mysql:
    image: mysql:8.0
    container_name: neocentral-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql


  # ── Cache (Redis) ─────────────────────────────
  redis:
    image: redis:7.0-alpine
    container_name: neocentral-redis2
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

  # ── Message Broker (NATS) ─────────────────────
  nats:
    image: nats:2.9-alpine
    container_name: neocentral-nats
    restart: always
    ports:
      - "4222:4222" # Client port
      - "8222:8222" # HTTP management port
    command: ["-js"] # Enable JetStream

  # ── Object Storage (MinIO) ─────────────────────
  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    container_name: neocentral-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000" # API port
      - "9005:9001" # Web UI port (changed to 9005 to avoid collision with auth-service gRPC port 9001)
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ── MinIO Init (Creates Bucket) ────────────────
  minio-init:
    image: minio/mc
    container_name: neocentral-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadminpassword;
      /usr/bin/mc mb myminio/neocentral-documents || true;
      /usr/bin/mc anonymous set download myminio/neocentral-documents;
      exit 0;
      "

  document-service:
    build:
      context: .
      dockerfile: ./document-service/Dockerfile
    container_name: neocentral-document-service
    ports:
      - "8003:8003"
    environment:
      - DB_URL=root:rootpassword@tcp(mysql:3306)/neocentral_document?charset=utf8mb4&parseTime=True&loc=Local
      - JWT_SECRET=supersecretkey
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
      - MINIO_USE_SSL=false
      - MINIO_BUCKET=neocentral-documents
    depends_on:
      - mysql
      - minio-init

  notification-service:
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    container_name: neocentral-notification-service
    ports:
      - "8004:8004"
    environment:
      - DB_URL=root:rootpassword@tcp(mysql:3306)/neocentral_notification?charset=utf8mb4&parseTime=True&loc=Local
      - JWT_SECRET=supersecretkey
      - NATS_URL=nats://nats:4222
    depends_on:
      - mysql
      - nats

  internship-service:
    build:
      context: .
      dockerfile: ./internship-service/Dockerfile
    container_name: neocentral-internship-service
    ports:
      - "8005:8005"
    environment:
      - DB_URL=root:rootpassword@tcp(mysql:3306)/neocentral_internship?charset=utf8mb4&parseTime=True&loc=Local
      - JWT_SECRET=supersecretkey
      - NATS_URL=nats://nats:4222
      - DOCUMENT_SERVICE_URL=http://document-service:8003
    depends_on:
      - mysql
      - nats
      - document-service

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    container_name: neocentral-auth-service
    ports:
      - "8001:8001"
      - "9001:9001"
    environment:
      - DB_URL=root:rootpassword@tcp(mysql:3306)/neocentral_auth?charset=utf8mb4&parseTime=True&loc=Local
      - JWT_SECRET=supersecretkey
      - NATS_URL=nats://nats:4222
    depends_on:
      - mysql
      - nats

  master-data-service:
    build:
      context: .
      dockerfile: ./master-data-service/Dockerfile
    container_name: neocentral-master-data-service
    ports:
      - "8002:8002"
      - "9002:9002"
    environment:
      - DB_URL=root:rootpassword@tcp(mysql:3306)/neocentral_master_data?charset=utf8mb4&parseTime=True&loc=Local
      - JWT_SECRET=supersecretkey
      - NATS_URL=nats://nats:4222
    depends_on:
      - mysql
      - nats

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: neocentral-api-gateway
    ports:
      - "8080:8080"
    environment:
      - HTTP_PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:8001
      - MASTER_DATA_SERVICE_URL=http://master-data-service:8002
      - DOCUMENT_SERVICE_URL=http://document-service:8003
      - NOTIFICATION_SERVICE_URL=http://notification-service:8004
      - INTERNSHIP_SERVICE_URL=http://internship-service:8005
    depends_on:
      - auth-service
      - master-data-service
      - document-service
      - notification-service
      - internship-service

volumes:
  mysql_data:
  redis_data:
  minio_data:
